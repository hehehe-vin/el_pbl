runtime: python310
service: default
entrypoint: gunicorn -b :$PORT main:app

# env_variables: keep or move secrets to Secret Manager
env_variables:
  SECRET_KEY: "yours_only_heheheheheheheh_____"

handlers:
  # Serve static files under /static
  - url: /static
    static_dir: static

  # Serve index.html at root
  - url: /
    static_files: static/index.html
    upload: static/index.html

  # Serve direct requests for other static files (css/js/images)
  - url: /(.*\.(gif|png|jpg|jpeg|svg|ico|css|js|html))
    static_files: static/\1
    upload: static/.*\.(gif|png|jpg|jpeg|svg|ico|css|js|html)

  # Everything else goes to Flask
  - url: /.*
    script: auto
